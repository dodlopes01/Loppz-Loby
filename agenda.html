<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Agenda</title>
<style>
  :root {
    --felt: #141212; --felt-2: #1C1918; --panel: #211D1C; --panel-2: #29231F;
    --gold: #C9A227; --gold-dim: #8F7620; --red: #A62D24; --red-dim: #7A211A; --red-bg: rgba(166,45,36,0.15); --cream: #EFE7D2; --muted: #9C9490;
    --danger: #D2564A; --danger-bg: #3A211D; --success: #E8843A; --success-bg: #3A2712;
    --line: rgba(239, 231, 210, 0.12);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--felt); color: var(--cream);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; min-height: 100vh; }
  .mono { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace; }
  .wrap { max-width: 620px; margin: 0 auto; padding: 26px 18px 110px; }

  header { display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid var(--line); }
  header h1 { font-size: 18px; font-weight: 700; margin: 0; color: var(--gold); }
  header span { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }

  .overview { display: flex; gap: 8px; margin-bottom: 18px; }
  .ov-stat {
    flex: 1; background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    padding: 10px 6px; text-align: center;
  }
  .ov-stat .v { font-size: 16px; font-weight: 800; color: var(--cream); font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace; }
  .ov-stat .v.pos { color: var(--success); }
  .ov-stat .v.neg { color: var(--danger); }
  .ov-stat .l { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 3px; }

  .quick-add { display: flex; gap: 10px; margin-bottom: 26px; }
  .quick-add button {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 13px; border-radius: 12px; font-size: 13.5px; font-weight: 800; cursor: pointer; border: none;
  }
  .qa-study { background: var(--gold); color: #1A1508; }
  .qa-session { background: var(--red); color: var(--cream); }
  .quick-add button .qic { font-size: 15px; }

  .week-group { margin-bottom: 22px; }
  .week-head {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 0 2px 8px; border-bottom: 1px dashed var(--line); margin-bottom: 10px;
  }
  .week-head .wt { font-size: 11.5px; font-weight: 800; color: var(--gold); text-transform: uppercase; letter-spacing: 0.05em; }
  .week-head .ws { font-size: 11px; color: var(--muted); font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace; }
  .week-head .ws.pos { color: var(--success); }
  .week-head .ws.neg { color: var(--danger); }

  .entry-list { display: flex; flex-direction: column; gap: 8px; }
  .entry {
    display: flex; align-items: center; gap: 12px; background: var(--panel); border: 1px solid var(--line);
    border-radius: 13px; padding: 10px 12px; cursor: pointer; transition: border-color .12s, background .12s;
  }
  .entry:hover { border-color: var(--gold-dim); background: var(--panel-2); }

  .chip {
    flex-shrink: 0; width: 38px; height: 38px; border-radius: 50%; position: relative;
    display: flex; align-items: center; justify-content: center; font-size: 15px;
    background: var(--felt-2); border: 2.5px dashed var(--chip-color, var(--gold-dim));
    box-shadow: 0 0 0 3px var(--felt-2), 0 0 0 4px var(--chip-color, var(--gold-dim));
  }

  .entry .einfo { flex: 1; min-width: 0; }
  .entry .etitle { font-size: 12.5px; font-weight: 800; color: var(--cream); }
  .entry .emeta { font-size: 10.5px; color: var(--muted); margin-top: 3px; line-height: 1.4; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .entry .eright { flex-shrink: 0; text-align: right; }
  .entry .edate { font-size: 9.5px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .entry .eval { font-size: 13px; font-weight: 800; margin-top: 3px; font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace; }
  .entry .eval.pos { color: var(--success); }
  .entry .eval.neg { color: var(--danger); }
  .entry .eval.gold { color: var(--gold); }

  .empty-feed {
    text-align: center; padding: 50px 20px; color: var(--muted); font-size: 13px; line-height: 1.7;
    border: 1px dashed var(--line); border-radius: 14px;
  }
  .empty-feed b { display: block; color: var(--gold); font-size: 15px; margin-bottom: 8px; }

  .streak-pill {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    background: var(--felt-2); border: 1px solid var(--gold-dim); color: var(--gold);
    font-size: 11.5px; font-weight: 700; padding: 8px 16px; border-radius: 999px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.45); z-index: 5; white-space: nowrap;
  }

  .sheet-backdrop {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 10;
  }
  .sheet-backdrop.show { display: block; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 11;
    background: var(--felt-2); border-top: 1px solid var(--line); border-radius: 20px 20px 0 0;
    padding: 8px 18px calc(20px + env(safe-area-inset-bottom, 0px));
    max-height: 88vh; overflow-y: auto;
    transform: translateY(105%); transition: transform .22s ease;
  }
  .sheet.show { transform: translateY(0); }
  .sheet-handle { width: 36px; height: 4px; background: var(--line); border-radius: 999px; margin: 8px auto 14px; }

  .sheet-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .sheet-head h2 { font-size: 15px; color: var(--gold); margin: 0; }
  .sheet-close { background: var(--panel); border: 1px solid var(--line); color: var(--cream);
    width: 30px; height: 30px; border-radius: 8px; cursor: pointer; font-size: 14px; }

  .type-toggle { display: flex; gap: 6px; margin-bottom: 14px; }
  .type-toggle button { flex: 1; background: var(--panel); border: 1px solid var(--line); color: var(--cream);
    font-size: 12.5px; font-weight: 700; padding: 9px; border-radius: 10px; cursor: pointer; }
  .type-toggle button.active.t-study { background: var(--gold); border-color: var(--gold); color: #1A1508; }
  .type-toggle button.active.t-session { background: var(--red); border-color: var(--red); color: var(--cream); }

  .date-chips { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
  .date-chips button { background: var(--panel); border: 1px solid var(--line); color: var(--muted);
    font-size: 11.5px; font-weight: 700; padding: 7px 12px; border-radius: 999px; cursor: pointer; }
  .date-chips button.active { background: var(--gold-dim); border-color: var(--gold-dim); color: #1A1508; }
  .date-chips input[type="date"] {
    background: var(--panel); border: 1px solid var(--line); color: var(--cream); border-radius: 999px;
    font-size: 11.5px; padding: 6px 10px; font-family: inherit;
  }

  .field-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .field { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 120px; }
  .field label { font-size: 10.5px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; font-weight: 700; }
  .field input, .field textarea {
    background: var(--panel); border: 1px solid var(--line); border-radius: 8px; color: var(--cream);
    font-size: 13.5px; padding: 9px 10px; font-family: inherit;
  }
  .field textarea { resize: vertical; min-height: 58px; }
  .field input:focus, .field textarea:focus { border-color: var(--gold-dim); outline: none; }

  .tool-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .tool-tag {
    background: var(--panel); border: 1px solid var(--line); color: var(--muted);
    font-size: 12px; font-weight: 700; padding: 7px 12px; border-radius: 999px; cursor: pointer;
  }
  .tool-tag.selected { background: var(--gold); border-color: var(--gold); color: #1A1508; }

  .sheet-actions { display: flex; gap: 8px; margin-top: 16px; }
  .sheet-actions button { flex: 1; padding: 12px; border-radius: 10px; font-size: 13px; font-weight: 800; cursor: pointer; border: none; }
  .btn-save { background: var(--red); color: var(--cream); }
  .btn-delete { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
  .sheet-status { font-size: 11.5px; color: var(--success); margin-top: 10px; min-height: 14px; text-align: center; }

  @media (min-width: 760px) {
    .wrap { padding: 44px 24px 60px; }
    .sheet { left: 50%; right: auto; transform: translate(-50%, 105%); width: 480px; border-radius: 20px; bottom: 24px; max-height: 84vh; }
    .sheet.show { transform: translate(-50%, 0); }
    .streak-pill { bottom: 26px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>📔 Agenda</h1>
    <span>estudo e jogo</span>
  </header>

  <div class="overview" id="overview"></div>

  <div class="quick-add">
    <button class="qa-study" id="btnAddStudy"><span class="qic">📖</span> Registrar estudo</button>
    <button class="qa-session" id="btnAddSession"><span class="qic">🃏</span> Registrar sessão</button>
  </div>

  <div id="feed"></div>
</div>

<div class="streak-pill" id="streakPill" style="display:none;"></div>

<div class="sheet-backdrop" id="sheetBackdrop"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-head">
    <h2 id="sheetTitle">Registro do dia</h2>
    <button class="sheet-close" id="sheetCloseBtn">✕</button>
  </div>

  <div class="type-toggle">
    <button class="t-study" id="typeStudyBtn">📖 Estudo</button>
    <button class="t-session" id="typeSessionBtn">🃏 Sessão</button>
  </div>

  <div class="date-chips" id="dateChips"></div>

  <div id="studyFields">
    <div class="field-row">
      <div class="field">
        <label>Duração (min)</label>
        <input type="number" id="studyMinutes" min="0" placeholder="ex: 45">
      </div>
    </div>
    <div class="field">
      <label>Ferramentas usadas</label>
      <div class="tool-tags" id="studyTools"></div>
    </div>
    <div class="field" style="margin-bottom:10px;">
      <label>O que você aprendeu</label>
      <textarea id="studyLearned" placeholder="ex: entendi melhor os ranges de push do BTN"></textarea>
    </div>
    <div class="field" style="margin-bottom:10px;">
      <label>Próximo passo</label>
      <input type="text" id="studyNext" placeholder="ex: revisar ranges de SB amanhã">
    </div>
  </div>

  <div id="sessionFields" style="display:none;">
    <div class="field-row">
      <div class="field">
        <label>Duração (min)</label>
        <input type="number" id="sessMinutes" min="0" placeholder="ex: 90">
      </div>
      <div class="field">
        <label>Torneios jogados</label>
        <input type="number" id="sessCount" min="0" placeholder="ex: 4">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Buy-in total (R$)</label>
        <input type="number" id="sessBuyin" min="0" step="0.01" placeholder="ex: 30.00">
      </div>
      <div class="field">
        <label>Resultado (+/- R$)</label>
        <input type="number" id="sessResult" step="0.01" placeholder="ex: 45.50 ou -30">
      </div>
    </div>
    <div class="field" style="margin-bottom:10px;">
      <label>Posição final (opcional)</label>
      <input type="text" id="sessPosition" placeholder="ex: 1º, 3º e 7º">
    </div>
    <div class="field" style="margin-bottom:10px;">
      <label>Próximo passo</label>
      <input type="text" id="sessNext" placeholder="ex: revisar mãos de bolha dessa sessão">
    </div>
  </div>

  <div class="sheet-actions">
    <button class="btn-save" id="saveBtn">💾 Salvar</button>
    <button class="btn-delete" id="deleteBtn">Apagar</button>
  </div>
  <p class="sheet-status" id="sheetStatus"></p>
</div>

<script>
(function () {
  var STORAGE_KEY = 'loppzloby_agenda_v1';
  var TOOLS = [
    { id: 'glossario', label: 'Glossário' },
    { id: 'outs', label: 'Outs & Odds' },
    { id: 'potodds', label: 'Pot Odds' },
    { id: 'ranges', label: 'Ranges' },
    { id: 'equity', label: 'Equity vs Range' },
    { id: 'icm', label: 'ICM' },
    { id: 'analise', label: 'Análise de Mãos' }
  ];
  var MONTH_ABBR = ['jan', 'fev', 'mar', 'abr', 'mai', 'jun', 'jul', 'ago', 'set', 'out', 'nov', 'dez'];

  var data = {};
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) data = JSON.parse(raw);
  } catch (e) { /* ignora localStorage indisponível */ }

  function persist() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
    catch (e) { /* ignora */ }
  }

  function pad2(n) { return n < 10 ? '0' + n : '' + n; }
  function dateKey(d) { return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate()); }
  function todayKey() { return dateKey(new Date()); }
  function fmtMoney(v) {
    var sign = v > 0 ? '+' : '';
    return sign + v.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  function mondayOf(d) {
    var x = new Date(d);
    var day = x.getDay();
    var diff = (day === 0 ? -6 : 1) - day;
    x.setDate(x.getDate() + diff);
    x.setHours(0, 0, 0, 0);
    return x;
  }

  function renderOverview() {
    var now = new Date();
    var monthPrefix = now.getFullYear() + '-' + pad2(now.getMonth() + 1);
    var studyMinutes = 0, netResult = 0, sessions = 0;
    Object.keys(data).forEach(function (k) {
      if (k.indexOf(monthPrefix) !== 0) return;
      var rec = data[k];
      if (rec.study && rec.study.minutes) studyMinutes += Number(rec.study.minutes) || 0;
      if (rec.session) {
        sessions++;
        netResult += Number(rec.session.result) || 0;
      }
    });
    var hours = (studyMinutes / 60).toFixed(1);
    var ov = document.getElementById('overview');
    ov.innerHTML =
      '<div class="ov-stat"><div class="v">' + hours + 'h</div><div class="l">estudo no mês</div></div>' +
      '<div class="ov-stat"><div class="v">' + sessions + '</div><div class="l">sessões no mês</div></div>' +
      '<div class="ov-stat"><div class="v ' + (netResult > 0 ? 'pos' : (netResult < 0 ? 'neg' : '')) + '">R$ ' + fmtMoney(netResult) + '</div><div class="l">resultado no mês</div></div>';

    var streak = 0;
    var cursor = new Date();
    while (true) {
      var dk = dateKey(cursor);
      if (data[dk] && (data[dk].study || data[dk].session)) { streak++; cursor.setDate(cursor.getDate() - 1); }
      else break;
    }
    var pill = document.getElementById('streakPill');
    if (streak > 0) {
      pill.style.display = 'block';
      pill.textContent = '🔥 ' + streak + ' dia' + (streak > 1 ? 's' : '') + ' seguido' + (streak > 1 ? 's' : '') + ' de estudo/jogo';
    } else {
      pill.style.display = 'none';
    }
  }

  function renderFeed() {
    var feedEl = document.getElementById('feed');
    feedEl.innerHTML = '';

    var keys = Object.keys(data).filter(function (k) { return data[k].study || data[k].session; }).sort().reverse();
    if (!keys.length) {
      feedEl.innerHTML = '<div class="empty-feed"><b>Sua agenda está vazia</b>Toque em “Registrar estudo” ou “Registrar sessão” acima pra começar a acompanhar seu progresso.</div>';
      return;
    }

    var thisMonday = mondayOf(new Date()).getTime();

    var groups = {};
    keys.forEach(function (k) {
      var d = new Date(k + 'T12:00:00');
      var mon = mondayOf(d).getTime();
      if (!groups[mon]) groups[mon] = [];
      groups[mon].push({ key: k, rec: data[k] });
    });

    var groupKeys = Object.keys(groups).map(Number).sort(function (a, b) { return b - a; });

    groupKeys.forEach(function (mon) {
      var entries = groups[mon];
      var netWeek = 0, hasMoney = false;
      entries.forEach(function (e) {
        if (e.rec.session && e.rec.session.result !== undefined) { netWeek += Number(e.rec.session.result) || 0; hasMoney = true; }
      });

      var label;
      if (mon === thisMonday) label = 'Esta semana';
      else if (mon === thisMonday - 7 * 86400000) label = 'Semana passada';
      else {
        var start = new Date(mon);
        var end = new Date(mon + 6 * 86400000);
        label = pad2(start.getDate()) + ' ' + MONTH_ABBR[start.getMonth()] + ' – ' + pad2(end.getDate()) + ' ' + MONTH_ABBR[end.getMonth()];
      }

      var group = document.createElement('div');
      group.className = 'week-group';
      var headHtml = '<div class="week-head"><span class="wt">' + label + '</span>' +
        (hasMoney ? '<span class="ws ' + (netWeek > 0 ? 'pos' : (netWeek < 0 ? 'neg' : '')) + '">R$ ' + fmtMoney(netWeek) + '</span>' : '') +
        '</div>';
      var listHtml = '<div class="entry-list"></div>';
      group.innerHTML = headHtml + listHtml;
      var listEl = group.querySelector('.entry-list');

      entries.forEach(function (e) {
        var d = new Date(e.key + 'T12:00:00');
        var dLbl = pad2(d.getDate()) + ' ' + MONTH_ABBR[d.getMonth()];

        if (e.rec.study) {
          var s = e.rec.study;
          var toolLbls = (s.tools || []).map(function (tid) {
            var t = TOOLS.filter(function (x) { return x.id === tid; })[0];
            return t ? t.label : null;
          }).filter(Boolean);
          var row = document.createElement('div');
          row.className = 'entry';
          row.innerHTML =
            '<div class="chip" style="--chip-color: var(--gold-dim);">📖</div>' +
            '<div class="einfo"><div class="etitle">' + (s.minutes || 0) + ' min de estudo</div>' +
            '<div class="emeta">' + (toolLbls.length ? toolLbls.join(' · ') : (s.learned ? s.learned.slice(0, 60) : 'sem detalhes')) + '</div></div>' +
            '<div class="eright"><div class="edate">' + dLbl + '</div></div>';
          row.addEventListener('click', function () { openSheet(e.key, 'study'); });
          listEl.appendChild(row);
        }
        if (e.rec.session) {
          var g = e.rec.session;
          var result = Number(g.result) || 0;
          var cls = result > 0 ? 'pos' : (result < 0 ? 'neg' : '');
          var chipColor = result > 0 ? 'var(--success)' : (result < 0 ? 'var(--danger)' : 'var(--gold-dim)');
          var row2 = document.createElement('div');
          row2.className = 'entry';
          row2.innerHTML =
            '<div class="chip" style="--chip-color: ' + chipColor + ';">🃏</div>' +
            '<div class="einfo"><div class="etitle">' + (g.tournaments || 0) + ' torneio(s) jogado(s)</div>' +
            '<div class="emeta">buy-in R$ ' + (Number(g.buyIn) || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + (g.position ? ' · ' + g.position : '') + '</div></div>' +
            '<div class="eright"><div class="edate">' + dLbl + '</div><div class="eval ' + cls + '">R$ ' + fmtMoney(result) + '</div></div>';
          row2.addEventListener('click', function () { openSheet(e.key, 'session'); });
          listEl.appendChild(row2);
        }
      });

      feedEl.appendChild(group);
    });
  }

  var sheet = document.getElementById('sheet');
  var backdrop = document.getElementById('sheetBackdrop');
  var currentType = 'study';
  var currentKey = todayKey();

  var studyToolsBox = document.getElementById('studyTools');
  var toolTagEls = {};
  TOOLS.forEach(function (t) {
    var tag = document.createElement('button');
    tag.type = 'button';
    tag.className = 'tool-tag';
    tag.textContent = t.label;
    tag.addEventListener('click', function () { tag.classList.toggle('selected'); });
    studyToolsBox.appendChild(tag);
    toolTagEls[t.id] = tag;
  });

  function buildDateChips() {
    var box = document.getElementById('dateChips');
    box.innerHTML = '';
    var today = new Date();
    var yest = new Date(); yest.setDate(yest.getDate() - 1);
    var opts = [
      { label: 'Hoje', key: dateKey(today) },
      { label: 'Ontem', key: dateKey(yest) }
    ];
    opts.forEach(function (o) {
      var b = document.createElement('button');
      b.type = 'button';
      b.textContent = o.label;
      b.dataset.key = o.key;
      b.className = currentKey === o.key ? 'active' : '';
      b.addEventListener('click', function () {
        currentKey = o.key;
        loadIntoForm();
        buildDateChips();
      });
      box.appendChild(b);
    });
    var inp = document.createElement('input');
    inp.type = 'date';
    inp.value = currentKey;
    inp.addEventListener('change', function () {
      if (inp.value) { currentKey = inp.value; loadIntoForm(); buildDateChips(); }
    });
    box.appendChild(inp);
  }

  function setType(type) {
    currentType = type;
    document.getElementById('typeStudyBtn').classList.toggle('active', type === 'study');
    document.getElementById('typeSessionBtn').classList.toggle('active', type === 'session');
    document.getElementById('studyFields').style.display = type === 'study' ? 'block' : 'none';
    document.getElementById('sessionFields').style.display = type === 'session' ? 'block' : 'none';
  }
  document.getElementById('typeStudyBtn').addEventListener('click', function () { setType('study'); });
  document.getElementById('typeSessionBtn').addEventListener('click', function () { setType('session'); });

  function loadIntoForm() {
    var rec = data[currentKey] || {};
    var s = rec.study || {};
    document.getElementById('studyMinutes').value = s.minutes || '';
    document.getElementById('studyLearned').value = s.learned || '';
    document.getElementById('studyNext').value = s.nextStep || '';
    var selectedTools = s.tools || [];
    TOOLS.forEach(function (t) { toolTagEls[t.id].classList.toggle('selected', selectedTools.indexOf(t.id) !== -1); });

    var g = rec.session || {};
    document.getElementById('sessMinutes').value = g.minutes || '';
    document.getElementById('sessCount').value = g.tournaments || '';
    document.getElementById('sessBuyin').value = g.buyIn || '';
    document.getElementById('sessResult').value = g.result !== undefined ? g.result : '';
    document.getElementById('sessPosition').value = g.position || '';
    document.getElementById('sessNext').value = g.nextStep || '';
    document.getElementById('sheetStatus').textContent = '';
  }

  function openSheet(key, type) {
    currentKey = key || todayKey();
    setType(type || 'study');
    buildDateChips();
    loadIntoForm();
    backdrop.classList.add('show');
    sheet.classList.add('show');
  }
  function closeSheet() {
    backdrop.classList.remove('show');
    sheet.classList.remove('show');
  }
  document.getElementById('btnAddStudy').addEventListener('click', function () { openSheet(todayKey(), 'study'); });
  document.getElementById('btnAddSession').addEventListener('click', function () { openSheet(todayKey(), 'session'); });
  document.getElementById('sheetCloseBtn').addEventListener('click', closeSheet);
  backdrop.addEventListener('click', closeSheet);

  document.getElementById('saveBtn').addEventListener('click', function () {
    if (currentType === 'study') {
      var minutes = parseInt(document.getElementById('studyMinutes').value, 10) || 0;
      var learned = document.getElementById('studyLearned').value.trim();
      var nextStep = document.getElementById('studyNext').value.trim();
      var tools = TOOLS.filter(function (t) { return toolTagEls[t.id].classList.contains('selected'); }).map(function (t) { return t.id; });
      if (!minutes && !learned && !tools.length) {
        document.getElementById('sheetStatus').style.color = 'var(--danger)';
        document.getElementById('sheetStatus').textContent = 'Preencha ao menos a duração ou o que você aprendeu.';
        return;
      }
      if (!data[currentKey]) data[currentKey] = {};
      data[currentKey].study = { minutes: minutes, learned: learned, nextStep: nextStep, tools: tools };
    } else {
      var sMinutes = parseInt(document.getElementById('sessMinutes').value, 10) || 0;
      var tournaments = parseInt(document.getElementById('sessCount').value, 10) || 0;
      var buyIn = parseFloat(document.getElementById('sessBuyin').value) || 0;
      var resultRaw = document.getElementById('sessResult').value;
      var result = resultRaw === '' ? undefined : parseFloat(resultRaw);
      var position = document.getElementById('sessPosition').value.trim();
      var sNextStep = document.getElementById('sessNext').value.trim();
      if (!sMinutes && !tournaments && !buyIn && result === undefined) {
        document.getElementById('sheetStatus').style.color = 'var(--danger)';
        document.getElementById('sheetStatus').textContent = 'Preencha ao menos a duração ou o resultado da sessão.';
        return;
      }
      if (!data[currentKey]) data[currentKey] = {};
      data[currentKey].session = {
        minutes: sMinutes, tournaments: tournaments, buyIn: buyIn,
        result: result === undefined ? 0 : result, position: position, nextStep: sNextStep
      };
    }
    persist();
    document.getElementById('sheetStatus').style.color = 'var(--success)';
    document.getElementById('sheetStatus').textContent = 'Salvo!';
    renderOverview();
    renderFeed();
    setTimeout(closeSheet, 500);
  });

  document.getElementById('deleteBtn').addEventListener('click', function () {
    if (!data[currentKey]) { closeSheet(); return; }
    var label = currentType === 'study' ? 'registro de estudo' : 'registro de sessão';
    if (!confirm('Apagar o ' + label + ' desse dia?')) return;
    delete data[currentKey][currentType];
    if (!data[currentKey].study && !data[currentKey].session) delete data[currentKey];
    persist();
    renderOverview();
    renderFeed();
    closeSheet();
  });

  renderOverview();
  renderFeed();
})();
</script>
</body>
</html>
